<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEG | Digital Testing Center</title>
    <style>
        :root { --primary: #003057; --accent: #fbbc05; --success: #28a745; --bg: #f0f4f8; --white: #ffffff; }
        body { font-family: 'Khmer OS Battambang', sans-serif; background: var(--bg); margin: 0; }
        .navbar { background: var(--primary); color: white; padding: 20px; text-align: center; font-size: 24px; font-weight: bold; border-bottom: 5px solid var(--accent); }
        .container { width: 90%; max-width: 800px; margin: 30px auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .card { border: 1px solid #ddd; padding: 20px; border-radius: 15px; text-align: center; cursor: pointer; transition: 0.3s; }
        .card:hover { border-color: var(--primary); background: #f9f9f9; }
        .hidden { display: none; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        .btn { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; width: 100%; font-size: 16px; }
        .question-card { background: #f9f9f9; padding: 15px; border-radius: 10px; margin-bottom: 15px; border-left: 5px solid var(--accent); }
        .option { display: block; margin: 10px 0; cursor: pointer; }
        .result-box { text-align: center; display: none; }
    </style>
</head>
<body>

<div class="navbar">SEG DIGITAL TESTING CENTER</div>

<div class="container">
    <div id="menu-step">
        <h2 style="text-align: center;">ជ្រើសរើសវិញ្ញាសា</h2>
        <div class="menu-grid">
            <div class="card" onclick="goToSetup('Homework')"><h3>Homework</h3></div>
            <div class="card" onclick="goToSetup('Worksheet')"><h3>Worksheet</h3></div>
            <div class="card" onclick="goToSetup('Final Exam')"><h3>Final Exam</h3></div>
        </div>
    </div>

    <div id="setup-step" class="hidden">
        <h2 id="setup-title"></h2>
        <p>សូមបិទភ្ជាប់កូដសំណួរដែលទទួលបានពីអ្នកគ្រូ៖</p>
        <textarea id="json-input" rows="8" placeholder='[ ["សំណួរ", "ចម្លើយ១", "ចម្លើយ២", "ចម្លើយ៣", "ចម្លើយត្រូវ"], ... ]'></textarea>
        <button class="btn" onclick="startExam()">បង្កើតវិញ្ញាសាភ្លាមៗ</button>
    </div>

    <div id="exam-step" class="hidden">
        <h2 id="active-title" style="color: var(--primary);"></h2>
        <input type="text" id="student-name" placeholder="វាយឈ្មោះរបស់អ្នក...">
        <div id="questions-container"></div>
        <button class="btn" style="background: var(--success);" onclick="finishExam()">បញ្ជូនចម្លើយ</button>
    </div>

    <div id="result-step" class="result-box">
        <h2 style="color: var(--success);">អបអរសាទរ! អ្នកធ្វើបានល្អណាស់</h2>
        <h3 id="res-name"></h3>
        <hr>
        <p>ពិន្ទុរបស់អ្នកគឺ៖</p>
        <h1 id="res-score" style="font-size: 60px; color: var(--primary);"></h1>
        <p>សូមថតរូបអេក្រង់លទ្ធផលនេះ រួចផ្ញើជូនអ្នកគ្រូក្នុង Telegram។</p>
        <button class="btn" onclick="location.reload()">ត្រឡប់ទៅដើមវិញ</button>
    </div>
</div>

<script>
    let examData = [];

    function goToSetup(title) {
        document.getElementById('menu-step').classList.add('hidden');
        document.getElementById('setup-step').classList.remove('hidden');
        document.getElementById('setup-title').innerText = "រៀបចំ " + title;
    }

    function startExam() {
        const input = document.getElementById('json-input').value;
        try {
            examData = JSON.parse(input);
            document.getElementById('setup-step').classList.add('hidden');
            document.getElementById('exam-step').classList.remove('hidden');
            
            let html = "";
            examData.forEach((item, index) => {
                html += `
                    <div class="question-card">
                        <p><b>${index + 1}. ${item[0]}</b></p>
                        <label class="option"><input type="radio" name="q${index}" value="${item[1]}"> ${item[1]}</label>
                        <label class="option"><input type="radio" name="q${index}" value="${item[2]}"> ${item[2]}</label>
                        <label class="option"><input type="radio" name="q${index}" value="${item[3]}"> ${item[3]}</label>
                    </div>
                `;
            });
            document.getElementById('questions-container').innerHTML = html;
        } catch (e) {
            alert("កូដសំណួរមិនត្រឹមត្រូវទេ! សូមពិនិត្យមើលម្ដងទៀត។");
        }
    }

    function finishExam() {
        const name = document.getElementById('student-name').value;
        if (!name) {
            alert("សូមវាយឈ្មោះរបស់អ្នកជាមុនសិន!");
            return;
        }

        let score = 0;
        examData.forEach((item, index) => {
            const selected = document.querySelector(`input[name="q${index}"]:checked`);
            if (selected && selected.value === item[4]) {
                score++;
            }
        });

        document.getElementById('exam-step').classList.add('hidden');
        document.getElementById('result-step').style.display = "block";
        document.getElementById('res-name').innerText = "ឈ្មោះ៖ " + name;
        document.getElementById('res-score').innerText = score + " / " + examData.length;
    }
</script>

</body>
</html>
